<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CER Staking</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
            color: #ffffff;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        .card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        h1 {
            font-size: 32px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #ffffff, #a0a0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            text-align: center;
            opacity: 0.6;
            font-size: 14px;
            margin-bottom: 24px;
        }
        .pool-status {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            padding: 16px;
            text-align: center;
            margin-bottom: 20px;
        }
        .status-active {
            color: #00ff88;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 255, 136, 0.1);
            padding: 8px 20px;
            border-radius: 40px;
        }
        .status-inactive {
            color: #ff4444;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 68, 68, 0.1);
            padding: 8px 20px;
            border-radius: 40px;
        }
        .status-loading {
            color: #ffaa44;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 170, 68, 0.1);
            padding: 8px 20px;
            border-radius: 40px;
        }
        button {
            width: 100%;
            padding: 16px;
            margin: 10px 0;
            border-radius: 20px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #0088cc, #0066aa);
            color: white;
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        input, select {
            width: 100%;
            padding: 16px;
            margin: 10px 0;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.4);
            color: white;
            font-size: 16px;
        }
        .wallet-info {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            padding: 12px;
            margin-top: 10px;
            font-size: 12px;
            word-break: break-all;
        }
        .stake-info {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 20px;
        }
        .stake-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .label {
            opacity: 0.6;
        }
        .value {
            font-weight: 600;
        }
        .profit {
            background: rgba(0, 255, 136, 0.1);
            padding: 12px;
            border-radius: 16px;
            text-align: center;
            margin: 10px 0;
        }
        .profit-value {
            font-size: 18px;
            font-weight: bold;
            color: #00ff88;
        }
        .max-hint {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            text-align: right;
            margin-top: -5px;
            margin-bottom: 10px;
        }
    </style>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>💰 CER STAKING</h1>
        <div class="subtitle">до 100% годовых</div>

        <div class="card">
            <div class="pool-status">
                <div id="pool-status" class="status-loading">
                    ⏳ Проверка пула...
                </div>
            </div>
        </div>

        <div class="card">
            <div id="wallet-status" style="text-align: center; margin-bottom: 10px;">⚡ Кошелек не подключен</div>
            <button id="connect-btn">🔌 Подключить кошелек</button>
            <div id="wallet-address" class="wallet-info"></div>
        </div>

        <div class="card">
            <div class="stake-info">
                <div class="stake-row">
                    <span class="label">💎 Мой стейк:</span>
                    <span id="my-stake" class="value">0 CER</span>
                </div>
                <div class="stake-row">
                    <span class="label">📈 Накоплено:</span>
                    <span id="my-reward" class="value">0 CER</span>
                </div>
                <div class="stake-row">
                    <span class="label">🔓 Разблокировка:</span>
                    <span id="unlock-date" class="value">—</span>
                </div>
            </div>
        </div>

        <div class="card">
            <h3>💸 Новый стейк</h3>
            <input type="number" id="amount" placeholder="Сумма CER" value="100">
            <select id="lock-days">
                <option value="30">30 дней — 8.22% годовых</option>
                <option value="90">90 дней — 24.66% годовых</option>
                <option value="180">180 дней — 49.32% годовых</option>
                <option value="365">365 дней — 100% годовых</option>
            </select>
            <div class="profit">
                Доход: <span id="profit-display" class="profit-value">0</span> CER
            </div>
            <button id="stake-btn" class="btn-primary">🚀 Стейкать</button>
        </div>

        <div class="card">
            <button id="unstake-btn" class="btn-primary">📤 Забрать стейк</button>
        </div>
    </div>

    <script>
        // Адрес стейкинг-контракта
        const STAKING_ADDRESS = "EQBLEMocvp-FS-jfhEKAQ2261_ZwJRvUKmaHHhZXIizLJQvs";
        
        let tonConnectUI;
        let walletAddress = null;
        let rewardPool = 0;

        function calculateProfit(amount, days) {
            const rate = (days / 365) * 100;
            return (amount * rate / 100).toFixed(2);
        }

        document.getElementById('lock-days').addEventListener('change', () => {
            const amount = parseFloat(document.getElementById('amount').value) || 0;
            const days = parseInt(document.getElementById('lock-days').value);
            document.getElementById('profit-display').textContent = calculateProfit(amount, days);
        });
        document.getElementById('amount').addEventListener('input', () => {
            const amount = parseFloat(document.getElementById('amount').value) || 0;
            const days = parseInt(document.getElementById('lock-days').value);
            document.getElementById('profit-display').textContent = calculateProfit(amount, days);
        });

        // Проверка статуса пула через API TON Center
        async function checkPoolStatus() {
            const statusDiv = document.getElementById('pool-status');
            try {
                // Запрос к контракту через TON Center API
                const response = await fetch(`https://toncenter.com/api/v2/runGetMethod?address=${STAKING_ADDRESS}&method=getRewardPool&stack=`);
                const data = await response.json();
                
                if (data.ok && data.result) {
                    // Получаем значение rewardPool
                    const poolValue = parseInt(data.result.stack[0][1], 16);
                    if (poolValue > 0) {
                        statusDiv.innerHTML = '<span class="status-active">✅ Активен</span>';
                        rewardPool = poolValue;
                    } else {
                        statusDiv.innerHTML = '<span class="status-inactive">❌ Неактивен</span>';
                    }
                } else {
                    statusDiv.innerHTML = '<span class="status-inactive">❌ Неактивен</span>';
                }
            } catch (e) {
                console.error('Error checking pool:', e);
                statusDiv.innerHTML = '<span class="status-inactive">❌ Неактивен</span>';
            }
        }

        async function loadStakeInfo(address) {
            // Здесь будет запрос к контракту
            document.getElementById('my-stake').textContent = "0 CER";
            document.getElementById('my-reward').textContent = "0 CER";
            document.getElementById('unlock-date').textContent = "—";
        }

        async function initTonConnect() {
            tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
                manifestUrl: 'https://raw.githubusercontent.com/brendbonus-star/cer-staking/main/tonconnect-manifest.json',
                buttonRootId: 'connect-btn'
            });
            
            tonConnectUI.onStatusChange(async (wallet) => {
                if (wallet) {
                    walletAddress = wallet.account.address;
                    document.getElementById('wallet-status').innerHTML = '✅ Кошелек подключен';
                    document.getElementById('wallet-address').innerHTML = walletAddress;
                    await loadStakeInfo(walletAddress);
                } else {
                    walletAddress = null;
                    document.getElementById('wallet-status').innerHTML = '⚡ Кошелек не подключен';
                    document.getElementById('wallet-address').innerHTML = '';
                }
            });
        }

        document.getElementById('stake-btn').addEventListener('click', async () => {
            if (!walletAddress) {
                alert('Сначала подключите кошелек');
                return;
            }
            
            const amount = parseFloat(document.getElementById('amount').value);
            const days = parseInt(document.getElementById('lock-days').value);
            
            if (!amount || amount <= 0) {
                alert('Введите сумму');
                return;
            }
            
            const comment = `stake:${days}`;
            
            const tx = {
                validUntil: Math.floor(Date.now() / 1000) + 600,
                messages: [{
                    address: STAKING_ADDRESS,
                    amount: amount.toString(),
                    payload: comment
                }]
            };
            
            try {
                await tonConnectUI.sendTransaction(tx);
                alert('Стейкинг отправлен!');
            } catch(e) {
                alert('Ошибка: ' + e.message);
            }
        });

        document.getElementById('unstake-btn').addEventListener('click', async () => {
            if (!walletAddress) {
                alert('Сначала подключите кошелек');
                return;
            }
            
            const tx = {
                validUntil: Math.floor(Date.now() / 1000) + 600,
                messages: [{
                    address: STAKING_ADDRESS,
                    amount: "0",
                    payload: "unstake"
                }]
            };
            
            try {
                await tonConnectUI.sendTransaction(tx);
                alert('Запрос на вывод отправлен!');
            } catch(e) {
                alert('Ошибка: ' + e.message);
            }
        });

        // Запуск
        checkPoolStatus();
        initTonConnect();
        
        // Обновляем статус каждые 10 секунд
        setInterval(checkPoolStatus, 10000);
    </script>
</body>
</html>
