<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CER Staking</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
            color: #ffffff;
            padding: 20px;
            min-height: 100vh;
        }
        .container { max-width: 500px; margin: 0 auto; }
        .card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        h1 {
            font-size: 32px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #ffffff, #a0a0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle { text-align: center; opacity: 0.6; font-size: 14px; margin-bottom: 24px; }
        .pool-status { text-align: center; margin-bottom: 20px; }
        .status-active { color: #00ff88; font-weight: 600; display: inline-block; background: rgba(0, 255, 136, 0.1); padding: 8px 20px; border-radius: 40px; }
        .status-inactive { color: #ff4444; font-weight: 600; display: inline-block; background: rgba(255, 68, 68, 0.1); padding: 8px 20px; border-radius: 40px; }
        .status-loading { color: #ffaa44; font-weight: 600; display: inline-block; background: rgba(255, 170, 68, 0.1); padding: 8px 20px; border-radius: 40px; }
        button {
            width: 100%;
            padding: 16px;
            margin: 10px 0;
            border-radius: 20px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        button:active { transform: scale(0.98); }
        .btn-primary { background: linear-gradient(135deg, #0088cc, #0066aa); color: white; }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .btn-admin { background: linear-gradient(135deg, #aa8800, #886600); color: white; }
        input, select {
            width: 100%;
            padding: 16px;
            margin: 10px 0;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.4);
            color: white;
            font-size: 16px;
        }
        .wallet-info { background: rgba(0, 0, 0, 0.3); border-radius: 20px; padding: 12px; margin-top: 10px; font-size: 12px; word-break: break-all; }
        .stake-info { background: rgba(0, 0, 0, 0.3); border-radius: 20px; padding: 16px; margin-bottom: 20px; }
        .stake-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        .label { opacity: 0.6; }
        .value { font-weight: 600; }
        .profit { background: rgba(0, 255, 136, 0.1); padding: 12px; border-radius: 16px; text-align: center; margin: 10px 0; }
        .profit-value { font-size: 18px; font-weight: bold; color: #00ff88; }
        .max-hint { font-size: 12px; color: rgba(255, 255, 255, 0.5); text-align: right; margin-top: -5px; margin-bottom: 10px; }
        .warning { color: #ffaa44; font-size: 12px; text-align: center; margin-top: 5px; }
        .user-balance {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 15px;
            text-align: center;
        }
        .user-balance span {
            color: #00ff88;
            font-weight: bold;
            font-size: 18px;
        }
        .admin-panel {
            display: none;
            border-top: 1px solid rgba(255,255,255,0.2);
            margin-top: 20px;
            padding-top: 20px;
        }
        .admin-panel h4 {
            margin-bottom: 15px;
            color: #ffaa44;
        }
        .rate-row {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 10px;
        }
        .rate-row input {
            flex: 1;
            margin: 0;
        }
        .rate-row button {
            width: auto;
            padding: 10px 20px;
            margin: 0;
        }
        #log-area {
            background: #000;
            color: #0f0;
            font-family: monospace;
            font-size: 12px;
            padding: 10px;
            border-radius: 12px;
            margin-top: 20px;
            max-height: 200px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }
    </style>
    <script type="module">
        import { AppKit, TonConnectConnector, Network, transferJetton } from 'https://esm.sh/@ton/appkit@0.0.1-alpha.5';
        
        const kit = new AppKit({
            networks: [Network.mainnet()],
            connectors: [new TonConnectConnector()],
            apiKey: 'd72cd242de2de30bfad0b95f4789fa866255fb4b80aeb00040749d25ac69ebdb'
        });
        
        window.stakeCer = async (amount, period) => {
            try {
                await transferJetton(kit, {
                    recipientAddress: 'EQDChXJt60bhVjLmBE6xGxZKYJvkJrB2F7CGANsojF-lY3Lk',
                    amount: amount.toString(),
                    jettonMaster: 'EQCeFJOkajBxztRloikZ9iUHhqnymZoX3pgxY47bbVlQuA3G',
                    comment: period.toString()
                });
                alert('Транзакция отправлена');
            } catch (e) {
                alert('Ошибка: ' + e.message);
            }
        };
    </script>
</head>
<body>
    <div class="container">
        <h1>💰 CER STAKING</h1>
        <div class="subtitle">до 100% годовых</div>

        <div class="card">
            <div class="pool-status">
                <span id="pool-status-text" class="status-loading">⏳ Загрузка...</span>
            </div>
        </div>

        <div class="card">
            <div id="wallet-status" style="text-align: center; margin-bottom: 10px;">⚡ Кошелек не подключен</div>
            <div id="connect-btn"></div>
            <div id="wallet-address" class="wallet-info"></div>
        </div>

        <div class="card">
            <div id="user-balance" class="user-balance">
                💎 Ваш баланс CER: <span id="cer-balance">0</span>
            </div>
            <div class="stake-info">
                <div class="stake-row"><span class="label">💎 Мой стейк:</span><span id="my-stake" class="value">0 CER</span></div>
                <div class="stake-row"><span class="label">📈 Накоплено:</span><span id="my-reward" class="value">0 CER</span></div>
                <div class="stake-row"><span class="label">🔓 Разблокировка:</span><span id="unlock-date" class="value">—</span></div>
            </div>
        </div>

        <div class="card">
            <h3>💸 Новый стейк</h3>
            <input type="number" id="amount" placeholder="Сумма CER" value="100">
            <select id="lock-days">
                <option value="30">30 дней — 8.22% годовых</option>
                <option value="90">90 дней — 24.66% годовых</option>
                <option value="180">180 дней — 49.32% годовых</option>
                <option value="365">365 дней — 100% годовых</option>
            </select>
            <div id="max-hint" class="max-hint"></div>
            <div class="profit">Доход: <span id="profit-display" class="profit-value">0</span> CER</div>
            <div id="warning" class="warning"></div>
            <button id="stake-btn" class="btn-primary">🚀 Стейкать</button>
        </div>

        <div class="card">
            <button id="unstake-btn" class="btn-primary">📤 Забрать стейк</button>
        </div>

        <div id="admin-panel" class="card admin-panel">
            <h4>⚙️ Админ-панель</h4>
            <div class="rate-row">
                <input type="number" id="rate30" placeholder="Ставка 30 дней (10000 = 100%)">
                <button id="set-rate30" class="btn-admin">Изменить 30 дней</button>
            </div>
            <div class="rate-row">
                <input type="number" id="rate90" placeholder="Ставка 90 дней">
                <button id="set-rate90" class="btn-admin">Изменить 90 дней</button>
            </div>
            <div class="rate-row">
                <input type="number" id="rate180" placeholder="Ставка 180 дней">
                <button id="set-rate180" class="btn-admin">Изменить 180 дней</button>
            </div>
            <div class="rate-row">
                <input type="number" id="rate365" placeholder="Ставка 365 дней">
                <button id="set-rate365" class="btn-admin">Изменить 365 дней</button>
            </div>
            <div class="rate-row">
                <input type="number" id="pool-amount" placeholder="Сумма CER для пула">
                <button id="add-reward" class="btn-admin">💰 Пополнить пул</button>
            </div>
            <div class="rate-row">
                <button id="withdraw-pool" class="btn-admin">📤 Вывести пул (778)</button>
            </div>
            <div class="rate-row">
                <button id="emergency-withdraw-pool" class="btn-admin">⚠️ Аварийный вывод пула (7777)</button>
            </div>
        </div>
        <div id="log-area"></div>
    </div>

    <script>
        const stakingContract = "EQDChXJt60bhVjLmBE6xGxZKYJvkJrB2F7CGANsojF-lY3Lk";
        const jettonMaster = "EQCeFJOkajBxztRloikZ9iUHhqnymZoX3pgxY47bbVlQuA3G";
        const apiUrl = "https://cer-staking-legkiy.amvera.io";
        
        let tonConnect;
        let walletAddress;
        let userJettonWallet;
        let selectedPeriod = 30;
        
        function log(msg) {
            const logArea = document.getElementById("log-area");
            const time = new Date().toLocaleTimeString();
            logArea.innerHTML += `<div>[${time}] ${msg}</div>`;
            logArea.scrollTop = logArea.scrollHeight;
            console.log(msg);
        }
        
        async function getJettonWallet(address) {
            try {
                const response = await fetch(`${apiUrl}/jetton-wallet/${address}`);
                const data = await response.json();
                return data.wallet;
            } catch (error) {
                log("Ошибка получения jettonWallet: " + error.message);
                return null;
            }
        }
        
        async function getBalance() {
            if (!walletAddress) return;
            try {
                const response = await fetch(`${apiUrl}/balance/${walletAddress}`);
                const data = await response.json();
                document.getElementById("cer-balance").innerText = (data.balance / 1e9).toFixed(2);
            } catch (error) {
                log("Ошибка баланса: " + error.message);
            }
        }
        
        async function getContractData() {
            try {
                const response = await fetch(`${apiUrl}/contract-data`);
                const data = await response.json();
                document.getElementById("rewardPool").innerText = (data.rewardPool / 1e9).toFixed(2);
                document.getElementById("totalStaked").innerText = (data.totalStaked / 1e9).toFixed(2);
                document.getElementById("rate30").innerText = (data.rate30 / 100).toFixed(2) + "%";
                document.getElementById("rate90").innerText = (data.rate90 / 100).toFixed(2) + "%";
                document.getElementById("rate180").innerText = (data.rate180 / 100).toFixed(2) + "%";
                document.getElementById("rate365").innerText = (data.rate365 / 100).toFixed(2) + "%";
            } catch (error) {
                log("Ошибка загрузки данных: " + error.message);
            }
        }
        
        document.getElementById("stake-btn").onclick = async () => {
            const amount = parseFloat(document.getElementById("amount").value);
            const period = document.getElementById("lock-days").value;
            if (!amount || amount <= 0) {
                alert("Введите сумму");
                return;
            }
            log(`Стейкинг ${amount} CER на ${period} дней`);
            if (typeof window.stakeCer === 'function') {
                await window.stakeCer(amount, period);
            } else {
                log("Ошибка: функция stakeCer не загружена");
            }
        };
        
        document.getElementById("unstake-btn").onclick = async () => {
            log("unstake - требуется реализация");
        };
        
        document.getElementById("add-reward").onclick = async () => {
            const amount = document.getElementById("pool-amount").value;
            log(`add-reward ${amount} - требуется реализация`);
        };
        
        document.getElementById("set-rate30").onclick = () => log("set-rate30");
        document.getElementById("set-rate90").onclick = () => log("set-rate90");
        document.getElementById("set-rate180").onclick = () => log("set-rate180");
        document.getElementById("set-rate365").onclick = () => log("set-rate365");
        document.getElementById("withdraw-pool").onclick = () => log("withdraw-pool");
        document.getElementById("emergency-withdraw-pool").onclick = () => log("emergency-withdraw-pool");
        
        getContractData();
        setInterval(getContractData, 30000);
        
        log("Приложение загружено");
    </script>
</body>
</html>
