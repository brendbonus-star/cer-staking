<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CER Staking - Тест TON</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
            color: #ffffff;
            padding: 20px;
            min-height: 100vh;
        }
        .container { max-width: 500px; margin: 0 auto; }
        .card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        button {
            width: 100%;
            padding: 16px;
            margin: 10px 0;
            border-radius: 20px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            background: linear-gradient(135deg, #0088cc, #0066aa);
            color: white;
        }
        .wallet-info { background: rgba(0, 0, 0, 0.3); border-radius: 20px; padding: 12px; margin-top: 10px; font-size: 12px; word-break: break-all; }
        #log-area {
            background: #000;
            color: #0f0;
            font-family: monospace;
            font-size: 12px;
            padding: 10px;
            border-radius: 12px;
            margin-top: 20px;
            max-height: 200px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }
    </style>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>💰 CER STAKING</h1>
            <div class="subtitle">Тест TON транзакции</div>
        </div>

        <div class="card">
            <div id="wallet-status" style="text-align: center; margin-bottom: 10px;">⚡ Кошелек не подключен</div>
            <button id="connect-btn">🔌 Подключить кошелек</button>
            <div id="wallet-address" class="wallet-info"></div>
        </div>

        <div class="card">
            <button id="test-ton-btn">📤 Отправить TON с комментарием 777</button>
            <button id="test-stake-btn">🚀 Тест стейка (комментарий 30)</button>
        </div>

        <div id="log-area"></div>
    </div>

    <script>
        const STAKING_ADDRESS = "EQDChXJt60bhVjLmBE6xGxZKYJvkJrB2F7CGANsojF-lY3Lk";
        
        let tonConnectUI;
        let walletAddress = null;

        function addLog(msg) {
            const logDiv = document.getElementById('log-area');
            const time = new Date().toLocaleTimeString();
            logDiv.innerHTML += `<div>[${time}] ${msg}</div>`;
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log(msg);
        }

        async function sendTon(comment) {
            addLog(`Начало отправки TON с комментарием: ${comment}`);
            if (!tonConnectUI) {
                addLog('❌ Ошибка: tonConnectUI не инициализирован');
                alert('TonConnect не инициализирован');
                return;
            }
            if (!walletAddress) {
                addLog('❌ Ошибка: кошелек не подключен');
                alert('Кошелек не подключен');
                return;
            }
            
            const tx = {
                validUntil: Math.floor(Date.now() / 1000) + 600,
                messages: [{
                    address: STAKING_ADDRESS,
                    amount: "50000000", // 0.05 TON
                    payload: comment
                }]
            };
            
            addLog('Отправка TON транзакции через TonConnect...');
            try {
                await tonConnectUI.sendTransaction(tx);
                addLog('✅ Транзакция отправлена');
                alert('Транзакция отправлена! Проверьте Tonkeeper.');
            } catch(e) {
                addLog(`❌ Ошибка: ${e.message}`);
                alert('Ошибка: ' + e.message);
            }
        }

        document.getElementById('test-ton-btn').onclick = () => sendTon('777');
        document.getElementById('test-stake-btn').onclick = () => sendTon('30');

        async function init() {
            addLog('Инициализация TonConnect...');
            tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
                manifestUrl: 'https://raw.githubusercontent.com/brendbonus-star/cer-staking/main/tonconnect-manifest.json',
                buttonRootId: 'connect-btn'
            });
            await tonConnectUI.ready;
            addLog('TonConnect готов');
            
            tonConnectUI.onStatusChange(async (wallet) => {
                if (wallet) {
                    walletAddress = wallet.account.address;
                    addLog(`Кошелек подключен: ${walletAddress}`);
                    document.getElementById('wallet-status').innerHTML = '✅ Кошелек подключен';
                    document.getElementById('wallet-address').innerHTML = walletAddress;
                } else {
                    walletAddress = null;
                    addLog('Кошелек отключен');
                    document.getElementById('wallet-status').innerHTML = '⚡ Кошелек не подключен';
                    document.getElementById('wallet-address').innerHTML = '';
                }
            });
        }

        init();
    </script>
</body>
</html>
