<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CER Staking</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
            color: #ffffff;
            padding: 20px;
            min-height: 100vh;
        }
        .container { max-width: 500px; margin: 0 auto; }
        .card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        h1 {
            font-size: 32px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #ffffff, #a0a0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle { text-align: center; opacity: 0.6; font-size: 14px; margin-bottom: 24px; }
        .pool-status { text-align: center; margin-bottom: 20px; }
        .status-active { color: #00ff88; font-weight: 600; display: inline-block; background: rgba(0, 255, 136, 0.1); padding: 8px 20px; border-radius: 40px; }
        .status-inactive { color: #ff4444; font-weight: 600; display: inline-block; background: rgba(255, 68, 68, 0.1); padding: 8px 20px; border-radius: 40px; }
        .status-loading { color: #ffaa44; font-weight: 600; display: inline-block; background: rgba(255, 170, 68, 0.1); padding: 8px 20px; border-radius: 40px; }
        button {
            width: 100%;
            padding: 16px;
            margin: 10px 0;
            border-radius: 20px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-primary { background: linear-gradient(135deg, #0088cc, #0066aa); color: white; }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-admin { background: linear-gradient(135deg, #aa8800, #886600); color: white; }
        input, select {
            width: 100%;
            padding: 16px;
            margin: 10px 0;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.4);
            color: white;
            font-size: 16px;
        }
        .wallet-info { background: rgba(0, 0, 0, 0.3); border-radius: 20px; padding: 12px; margin-top: 10px; font-size: 12px; word-break: break-all; }
        .stake-info { background: rgba(0, 0, 0, 0.3); border-radius: 20px; padding: 16px; margin-bottom: 20px; }
        .stake-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        .label { opacity: 0.6; }
        .value { font-weight: 600; }
        .profit { background: rgba(0, 255, 136, 0.1); padding: 12px; border-radius: 16px; text-align: center; margin: 10px 0; }
        .profit-value { font-size: 18px; font-weight: bold; color: #00ff88; }
        .max-hint { font-size: 12px; color: rgba(255, 255, 255, 0.5); text-align: right; margin-top: -5px; margin-bottom: 10px; }
        .warning { color: #ffaa44; font-size: 12px; text-align: center; margin-top: 5px; }
        .user-balance {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 15px;
            text-align: center;
        }
        .user-balance span {
            color: #00ff88;
            font-weight: bold;
            font-size: 18px;
        }
        .admin-panel {
            display: none;
            border-top: 1px solid rgba(255,255,255,0.2);
            margin-top: 20px;
            padding-top: 20px;
        }
        .admin-panel h4 {
            margin-bottom: 15px;
            color: #ffaa44;
        }
        .rate-row {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 10px;
        }
        .rate-row input {
            flex: 1;
            margin: 0;
        }
        .rate-row button {
            width: auto;
            padding: 10px 20px;
            margin: 0;
        }
    </style>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <script src="https://unpkg.com/@ton/ton@13.0.0/dist/index.js"></script>
</head>
<body>
    <div class="container">
        <h1>💰 CER STAKING</h1>
        <div class="subtitle">до 100% годовых</div>

        <div class="card">
            <div class="pool-status">
                <span id="pool-status-text" class="status-loading">⏳ Загрузка...</span>
            </div>
        </div>

        <div class="card">
            <div id="wallet-status" style="text-align: center; margin-bottom: 10px;">⚡ Кошелек не подключен</div>
            <button id="connect-btn">🔌 Подключить кошелек</button>
            <div id="wallet-address" class="wallet-info"></div>
        </div>

        <div class="card">
            <div id="user-balance" class="user-balance">
                💎 Ваш баланс CER: <span id="cer-balance">0</span>
            </div>
            <div class="stake-info">
                <div class="stake-row"><span class="label">💎 Мой стейк:</span><span id="my-stake" class="value">0 CER</span></div>
                <div class="stake-row"><span class="label">📈 Накоплено:</span><span id="my-reward" class="value">0 CER</span></div>
                <div class="stake-row"><span class="label">🔓 Разблокировка:</span><span id="unlock-date" class="value">—</span></div>
            </div>
        </div>

        <div class="card">
            <h3>💸 Новый стейк</h3>
            <input type="number" id="amount" placeholder="Сумма CER" value="100">
            <select id="lock-days">
                <option value="30">30 дней — 8.22% годовых</option>
                <option value="90">90 дней — 24.66% годовых</option>
                <option value="180">180 дней — 49.32% годовых</option>
                <option value="365">365 дней — 100% годовых</option>
            </select>
            <div id="max-hint" class="max-hint"></div>
            <div class="profit">Доход: <span id="profit-display" class="profit-value">0</span> CER</div>
            <div id="warning" class="warning"></div>
            <button id="stake-btn" class="btn-primary">🚀 Стейкать</button>
        </div>

        <div class="card">
            <button id="unstake-btn" class="btn-primary">📤 Забрать стейк</button>
        </div>

        <!-- Админ-панель (видна только владельцу контракта) -->
        <div id="admin-panel" class="card admin-panel">
            <h4>⚙️ Админ-панель</h4>
            <div class="rate-row">
                <input type="number" id="rate30" placeholder="Ставка 30 дней (10000 = 100%)">
                <button id="set-rate30" class="btn-admin">Изменить 30 дней</button>
            </div>
            <div class="rate-row">
                <input type="number" id="rate90" placeholder="Ставка 90 дней">
                <button id="set-rate90" class="btn-admin">Изменить 90 дней</button>
            </div>
            <div class="rate-row">
                <input type="number" id="rate180" placeholder="Ставка 180 дней">
                <button id="set-rate180" class="btn-admin">Изменить 180 дней</button>
            </div>
            <div class="rate-row">
                <input type="number" id="rate365" placeholder="Ставка 365 дней">
                <button id="set-rate365" class="btn-admin">Изменить 365 дней</button>
            </div>
            <div class="rate-row">
                <input type="number" id="pool-amount" placeholder="Сумма CER для пула">
                <button id="add-reward" class="btn-admin">💰 Пополнить пул</button>
            </div>
            <div class="rate-row">
                <button id="withdraw-pool" class="btn-admin">📤 Вывести пул (778)</button>
            </div>
            <div class="rate-row">
                <button id="emergency-withdraw-pool" class="btn-admin">⚠️ Аварийный вывод пула (7777)</button>
            </div>
        </div>
    </div>

    <script>
        // ===== КОНФИГ =====
        const STAKING_ADDRESS = "EQDChXJt60bhVjLmBE6xGxZKYJvkJrB2F7CGANsojF-lY3Lk";
        const JETTON_MASTER = "EQCeFJOkajBxztRloikZ9iUHhqnymZoX3pgxY47bbVlQuA3G";
        const API_URL = window.location.origin; // если сервер на том же домене

        let tonConnectUI;
        let walletAddress = null;
        let rewardPool = 0;
        let userBalance = 0;
        let jettonWallet = null;
        let myStake = 0;
        let myReward = 0;
        let unlockTime = 0;

        // ===== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ =====
        function calculateProfit(amount, days) {
            const rates = {30: 821, 90: 2466, 180: 4932, 365: 10000};
            const rate = rates[days];
            return (amount * rate / 10000).toFixed(2);
        }

        async function getUserBalanceAndJettonWallet(address) {
            try {
                const url = `https://tonapi.io/v2/accounts/${address}/jettons?jetton_master=${JETTON_MASTER}`;
                const response = await fetch(url);
                const data = await response.json();
                if (data && data.balances && data.balances.length > 0) {
                    const balance = parseInt(data.balances[0].balance);
                    jettonWallet = data.balances[0].wallet_address.address;
                    return balance / 1e9;
                }
                jettonWallet = null;
                return 0;
            } catch (e) {
                jettonWallet = null;
                return 0;
            }
        }

        async function getRewardPool() {
            try {
                const res = await fetch(`${API_URL}/reward_pool`);
                const data = await res.json();
                return data.rewardPool || 0;
            } catch (e) {
                return 0;
            }
        }

        async function updateData() {
            if (walletAddress) {
                userBalance = await getUserBalanceAndJettonWallet(walletAddress);
                document.getElementById('cer-balance').textContent = userBalance;
                // TODO: получить стейки пользователя через API
            }
            rewardPool = await getRewardPool();
            const statusSpan = document.getElementById('pool-status-text');
            if (rewardPool > 0) {
                statusSpan.innerHTML = '✅ Активен';
                statusSpan.className = 'status-active';
            } else {
                statusSpan.innerHTML = '❌ Неактивен';
                statusSpan.className = 'status-inactive';
            }
            updateUI();
        }

        function updateUI() {
            const amount = parseFloat(document.getElementById('amount').value) || 0;
            const days = parseInt(document.getElementById('lock-days').value);
            const profit = calculateProfit(amount, days);
            document.getElementById('profit-display').textContent = profit;
            
            const maxByBalance = Math.min(userBalance, rewardPool);
            document.getElementById('max-hint').innerHTML = `Максимум: ${maxByBalance} CER (пул: ${rewardPool} CER, ваш баланс: ${userBalance} CER)`;
            
            if (amount > maxByBalance) {
                document.getElementById('warning').innerHTML = '⚠️ Сумма превышает ваш баланс или лимит пула';
                document.getElementById('stake-btn').disabled = true;
            } else {
                document.getElementById('warning').innerHTML = '';
                document.getElementById('stake-btn').disabled = false;
            }
            
            document.getElementById('my-stake').textContent = `${myStake} CER`;
            document.getElementById('my-reward').textContent = `${myReward} CER`;
        }

        // ===== ОТПРАВКА ТРАНЗАКЦИИ =====
        async function sendComment(comment, amount = "0.000000001") {
            if (!walletAddress) throw new Error('Кошелек не подключен');
            if (!jettonWallet && comment !== "0" && comment !== "unstake") {
                throw new Error('Jetton-кошелек не найден');
            }
            
            const amountInNano = Math.floor(parseFloat(amount) * 1e9);
            
            // Создаем forward payload для комментария
            const forwardPayload = new TON_CORE.Cell();
            forwardPayload.bits.writeUint(0, 32);
            forwardPayload.bits.writeString(comment);
            
            // Тело Jetton Transfer (opcode 0xf8a7ea5)
            const body = new TON_CORE.Cell();
            body.bits.writeUint(0xf8a7ea5, 32);
            body.bits.writeUint(0, 64);
            body.bits.writeCoins(BigInt(amountInNano));
            body.bits.writeAddress(TON_CORE.Address.parse(STAKING_ADDRESS));
            body.bits.writeAddress(TON_CORE.Address.parse(walletAddress));
            body.bits.writeBit(0);
            body.bits.writeCoins(50000000n);
            body.bits.writeBit(1);
            body.bits.writeRef(forwardPayload);
            
            const transaction = {
                validUntil: Math.floor(Date.now() / 1000) + 600,
                messages: [{
                    address: jettonWallet,
                    amount: "50000000",
                    payload: body.toBoc().toString("base64")
                }]
            };
            
            await tonConnectUI.sendTransaction(transaction);
        }

        // ===== ОБРАБОТЧИКИ =====
        document.getElementById('stake-btn').addEventListener('click', async () => {
            const amount = parseFloat(document.getElementById('amount').value);
            const days = parseInt(document.getElementById('lock-days').value);
            if (amount <= 0) return alert('Введите сумму');
            if (amount > Math.min(userBalance, rewardPool)) return alert('Сумма превышает лимит');
            try {
                await sendComment(days.toString(), amount.toString());
                alert('Стейк отправлен!');
            } catch(e) { alert('Ошибка: ' + e.message); }
        });

        document.getElementById('unstake-btn').addEventListener('click', async () => {
            try {
                await sendComment("0", "0.000000001");
                alert('Запрос на вывод отправлен!');
            } catch(e) { alert('Ошибка: ' + e.message); }
        });

        // Админ-функции (только для владельца контракта)
        async function adminSend(comment, amount = "0.000000001") {
            // Проверка, что подключенный кошелек является владельцем контракта
            // TODO: получить owner из контракта и сравнить с walletAddress
            try {
                await sendComment(comment, amount);
                alert(`Команда "${comment}" отправлена`);
            } catch(e) { alert('Ошибка: ' + e.message); }
        }

        document.getElementById('set-rate30').onclick = () => {
            const rate = document.getElementById('rate30').value;
            if (!rate) return;
            adminSend(`rate30:${rate}`);
        };
        document.getElementById('set-rate90').onclick = () => {
            const rate = document.getElementById('rate90').value;
            if (!rate) return;
            adminSend(`rate90:${rate}`);
        };
        document.getElementById('set-rate180').onclick = () => {
            const rate = document.getElementById('rate180').value;
            if (!rate) return;
            adminSend(`rate180:${rate}`);
        };
        document.getElementById('set-rate365').onclick = () => {
            const rate = document.getElementById('rate365').value;
            if (!rate) return;
            adminSend(`rate365:${rate}`);
        };
        document.getElementById('add-reward').onclick = () => {
            const amount = document.getElementById('pool-amount').value;
            if (!amount) return;
            adminSend('777', amount);
        };
        document.getElementById('withdraw-pool').onclick = () => adminSend('778');
        document.getElementById('emergency-withdraw-pool').onclick = () => adminSend('7777');

        // ===== ИНИЦИАЛИЗАЦИЯ TON CONNECT =====
        async function initTonConnect() {
            tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
                manifestUrl: 'https://raw.githubusercontent.com/brendbonus-star/cer-staking/main/tonconnect-manifest.json',
                buttonRootId: 'connect-btn'
            });
            
            tonConnectUI.onStatusChange(async (wallet) => {
                if (wallet) {
                    walletAddress = wallet.account.address;
                    document.getElementById('wallet-status').innerHTML = '✅ Кошелек подключен';
                    document.getElementById('wallet-address').innerHTML = walletAddress;
                    await updateData();
                    
                    // Показываем админ-панель (временно для всех, потом нужно будет проверять owner)
                    document.getElementById('admin-panel').style.display = 'block';
                } else {
                    walletAddress = null;
                    document.getElementById('wallet-status').innerHTML = '⚡ Кошелек не подключен';
                    document.getElementById('wallet-address').innerHTML = '';
                    document.getElementById('admin-panel').style.display = 'none';
                }
            });
        }

        document.getElementById('lock-days').addEventListener('change', updateUI);
        document.getElementById('amount').addEventListener('input', updateUI);

        initTonConnect();
        updateData();
        setInterval(updateData, 30000);
    </script>
</body>
</html>
