<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CER Staking</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
            color: #ffffff;
            padding: 20px;
            min-height: 100vh;
        }
        .container { max-width: 500px; margin: 0 auto; }
        .card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        h1 {
            font-size: 32px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #ffffff, #a0a0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle { text-align: center; opacity: 0.6; font-size: 14px; margin-bottom: 24px; }
        .pool-status { text-align: center; margin-bottom: 20px; }
        .status-active { color: #00ff88; font-weight: 600; display: inline-block; background: rgba(0, 255, 136, 0.1); padding: 8px 20px; border-radius: 40px; }
        .status-inactive { color: #ff4444; font-weight: 600; display: inline-block; background: rgba(255, 68, 68, 0.1); padding: 8px 20px; border-radius: 40px; }
        .status-loading { color: #ffaa44; font-weight: 600; display: inline-block; background: rgba(255, 170, 68, 0.1); padding: 8px 20px; border-radius: 40px; }
        button {
            width: 100%;
            padding: 16px;
            margin: 10px 0;
            border-radius: 20px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        button:active { transform: scale(0.98); }
        .btn-primary { background: linear-gradient(135deg, #0088cc, #0066aa); color: white; }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .btn-admin { background: linear-gradient(135deg, #aa8800, #886600); color: white; }
        input, select {
            width: 100%;
            padding: 16px;
            margin: 10px 0;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.4);
            color: white;
            font-size: 16px;
        }
        .wallet-info { background: rgba(0, 0, 0, 0.3); border-radius: 20px; padding: 12px; margin-top: 10px; font-size: 12px; word-break: break-all; }
        .stake-info { background: rgba(0, 0, 0, 0.3); border-radius: 20px; padding: 16px; margin-bottom: 20px; }
        .stake-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        .label { opacity: 0.6; }
        .value { font-weight: 600; }
        .profit { background: rgba(0, 255, 136, 0.1); padding: 12px; border-radius: 16px; text-align: center; margin: 10px 0; }
        .profit-value { font-size: 18px; font-weight: bold; color: #00ff88; }
        .max-hint { font-size: 12px; color: rgba(255, 255, 255, 0.5); text-align: right; margin-top: -5px; margin-bottom: 10px; }
        .warning { color: #ffaa44; font-size: 12px; text-align: center; margin-top: 5px; }
        .user-balance {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 15px;
            text-align: center;
        }
        .user-balance span {
            color: #00ff88;
            font-weight: bold;
            font-size: 18px;
        }
        .admin-panel {
            display: none;
            border-top: 1px solid rgba(255,255,255,0.2);
            margin-top: 20px;
            padding-top: 20px;
        }
        .admin-panel h4 {
            margin-bottom: 15px;
            color: #ffaa44;
        }
        .rate-row {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 10px;
        }
        .rate-row input {
            flex: 1;
            margin: 0;
        }
        .rate-row button {
            width: auto;
            padding: 10px 20px;
            margin: 0;
        }
        #log-area {
            background: #000;
            color: #0f0;
            font-family: monospace;
            font-size: 12px;
            padding: 10px;
            border-radius: 12px;
            margin-top: 20px;
            max-height: 200px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .pool-stats {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 16px;
        }
    </style>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>💰 CER STAKING</h1>
        <div class="subtitle">до 100% годовых</div>

        <div class="card">
            <div class="pool-status">
                <span id="pool-status-text" class="status-loading">⏳ Загрузка...</span>
            </div>
            <div class="pool-stats">
                <span>📊 Пул наград:</span>
                <span id="pool-amount" style="color:#00ff88;">0</span>
                <span>CER</span>
            </div>
            <div class="pool-stats">
                <span>💎 Всего застейкано:</span>
                <span id="total-staked" style="color:#00ff88;">0</span>
                <span>CER</span>
            </div>
        </div>

        <div class="card">
            <div id="wallet-status" style="text-align: center; margin-bottom: 10px;">⚡ Кошелек не подключен</div>
            <div id="connect-btn"></div>
            <div id="wallet-address" class="wallet-info"></div>
        </div>

        <div class="card">
            <div id="user-balance" class="user-balance">
                💎 Ваш баланс CER: <span id="cer-balance">0</span>
            </div>
            <div class="stake-info">
                <div class="stake-row"><span class="label">💎 Мой стейк:</span><span id="my-stake" class="value">0 CER</span></div>
                <div class="stake-row"><span class="label">📈 Накоплено:</span><span id="my-reward" class="value">0 CER</span></div>
                <div class="stake-row"><span class="label">🔓 Разблокировка:</span><span id="unlock-date" class="value">—</span></div>
            </div>
        </div>

        <div class="card">
            <h3>💸 Новый стейк</h3>
            <input type="number" id="amount" placeholder="Сумма CER" value="100">
            <select id="lock-days">
                <option value="30">30 дней — 8.22% годовых</option>
                <option value="90">90 дней — 24.66% годовых</option>
                <option value="180">180 дней — 49.32% годовых</option>
                <option value="365">365 дней — 100% годовых</option>
            </select>
            <div id="max-hint" class="max-hint"></div>
            <div class="profit">Доход: <span id="profit-display" class="profit-value">0</span> CER</div>
            <div id="warning" class="warning"></div>
            <button id="stake-btn" class="btn-primary">🚀 Стейкать</button>
        </div>

        <div class="card">
            <button id="unstake-btn" class="btn-primary">📤 Забрать стейк</button>
        </div>

        <div id="admin-panel" class="card admin-panel">
            <h4>⚙️ Админ-панель</h4>
            <div class="rate-row">
                <input type="number" id="rate30" placeholder="Ставка 30 дней (10000 = 100%)">
                <button id="set-rate30" class="btn-admin">Изменить 30 дней</button>
            </div>
            <div class="rate-row">
                <input type="number" id="rate90" placeholder="Ставка 90 дней">
                <button id="set-rate90" class="btn-admin">Изменить 90 дней</button>
            </div>
            <div class="rate-row">
                <input type="number" id="rate180" placeholder="Ставка 180 дней">
                <button id="set-rate180" class="btn-admin">Изменить 180 дней</button>
            </div>
            <div class="rate-row">
                <input type="number" id="rate365" placeholder="Ставка 365 дней">
                <button id="set-rate365" class="btn-admin">Изменить 365 дней</button>
            </div>
            <div class="rate-row">
                <input type="number" id="pool-amount" placeholder="Сумма CER для пула">
                <button id="add-reward" class="btn-admin">💰 Пополнить пул</button>
            </div>
            <div class="rate-row">
                <button id="withdraw-pool" class="btn-admin">📤 Вывести пул (778)</button>
            </div>
            <div class="rate-row">
                <button id="emergency-withdraw-pool" class="btn-admin">⚠️ Аварийный вывод пула (7777)</button>
            </div>
        </div>
        <div id="log-area"></div>
    </div>

    <script>
        const STAKING_ADDRESS = "EQDChXJt60bhVjLmBE6xGxZKYJvkJrB2F7CGANsojF-lY3Lk";
        const JETTON_MASTER = "EQCeFJOkajBxztRloikZ9iUHhqnymZoX3pgxY47bbVlQuA3G";
        
        let tonConnectUI;
        let walletAddress = null;
        let jettonWallet = null;
        let userBalance = 0;
        let rewardPool = 0;
        let totalStaked = 0;
        let userStake = { totalStaked: 0, totalReward: 0, unlockTime: '—' };

        function addLog(msg) {
            const logDiv = document.getElementById('log-area');
            const time = new Date().toLocaleTimeString();
            logDiv.innerHTML += `<div>[${time}] ${msg}</div>`;
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log(msg);
        }

        // Получаем rewardPool из контракта
        async function getRewardPool() {
            try {
                addLog(`Запрос rewardPool из контракта...`);
                const response = await fetch(`https://tonapi.io/v2/blockchain/accounts/${STAKING_ADDRESS}/methods/get_reward_pool`);
                const data = await response.json();
                
                if (data && data.result && data.result.stack) {
                    for (let item of data.result.stack) {
                        if (item.type === 'num') {
                            const value = parseInt(item.value);
                            addLog(`✅ rewardPool получен: ${value / 1e9} CER`);
                            return value;
                        }
                    }
                }
                return 0;
            } catch(e) {
                addLog(`❌ Ошибка получения rewardPool: ${e.message}`);
                return 0;
            }
        }

        // Получаем totalStaked из контракта
        async function getTotalStaked() {
            try {
                const response = await fetch(`https://tonapi.io/v2/blockchain/accounts/${STAKING_ADDRESS}/methods/get_total_staked`);
                const data = await response.json();
                
                if (data && data.result && data.result.stack) {
                    for (let item of data.result.stack) {
                        if (item.type === 'num') {
                            return parseInt(item.value);
                        }
                    }
                }
                return 0;
            } catch(e) {
                addLog(`Ошибка получения totalStaked: ${e.message}`);
                return 0;
            }
        }

        // Получаем стейк пользователя (упрощенно, через эмуляцию)
        // В реальности нужно вызывать несколько get-функций
        async function getUserStakeInfo(userAddress) {
            try {
                // Здесь должна быть логика получения стейков пользователя
                // Пока возвращаем заглушку
                return { totalStaked: 0, totalReward: 0, unlockTime: '—' };
            } catch(e) {
                return { totalStaked: 0, totalReward: 0, unlockTime: '—' };
            }
        }

        async function getUserJettonWallet(address) {
            try {
                addLog(`Запрос Jetton-кошелька для ${address}...`);
                const url = `https://tonapi.io/v2/accounts/${address}/jettons`;
                const r = await fetch(url);
                const d = await r.json();
                if (d && d.balances && d.balances.length > 0) {
                    for (let jetton of d.balances) {
                        if (jetton.jetton?.address === JETTON_MASTER) {
                            jettonWallet = jetton.wallet_address.address;
                            addLog(`✅ Jetton-кошелек найден: ${jettonWallet}`);
                            return parseInt(jetton.balance) / 1e9;
                        }
                    }
                }
                addLog(`⚠️ CER токены не найдены`);
                jettonWallet = null;
                return 0;
            } catch(e) {
                addLog(`❌ Ошибка получения Jetton-кошелька: ${e.message}`);
                jettonWallet = null;
                return 0;
            }
        }

        async function updateData() {
            addLog(`🔄 Обновление данных...`);
            
            // Получаем баланс пользователя
            if (walletAddress) {
                userBalance = await getUserJettonWallet(walletAddress);
                document.getElementById('cer-balance').textContent = userBalance.toFixed(2);
            }
            
            // Получаем пул и totalStaked
            rewardPool = await getRewardPool();
            totalStaked = await getTotalStaked();
            
            document.getElementById('pool-amount').textContent = (rewardPool / 1e9).toFixed(2);
            document.getElementById('total-staked').textContent = (totalStaked / 1e9).toFixed(2);
            
            // Обновляем статус
            const statusSpan = document.getElementById('pool-status-text');
            if (rewardPool > 0) {
                statusSpan.innerHTML = '✅ Активен';
                statusSpan.className = 'status-active';
            } else {
                statusSpan.innerHTML = '⚠️ Требуется пополнение пула';
                statusSpan.className = 'status-inactive';
            }
            
            // Получаем стейк пользователя
            if (walletAddress) {
                userStake = await getUserStakeInfo(walletAddress);
                document.getElementById('my-stake').textContent = `${userStake.totalStaked.toFixed(2)} CER`;
                document.getElementById('my-reward').textContent = `${userStake.totalReward.toFixed(2)} CER`;
                document.getElementById('unlock-date').textContent = userStake.unlockTime;
            }
            
            updateUI();
        }

        function updateUI() {
            const amount = parseFloat(document.getElementById('amount').value) || 0;
            const days = parseInt(document.getElementById('lock-days').value);
            const rates = {30: 822, 90: 2466, 180: 4932, 365: 10000};
            const rate = rates[days];
            const profit = (amount * rate / 10000).toFixed(2);
            document.getElementById('profit-display').textContent = profit;
            
            const maxByBalance = Math.min(userBalance, rewardPool / 1e9);
            document.getElementById('max-hint').innerHTML = `Максимум: ${maxByBalance.toFixed(2)} CER (пул: ${(rewardPool / 1e9).toFixed(2)} CER, ваш баланс: ${userBalance.toFixed(2)} CER)`;
            
            const stakeBtn = document.getElementById('stake-btn');
            if (amount > maxByBalance || amount <= 0 || rewardPool === 0) {
                let warningMsg = '';
                if (amount <= 0) warningMsg = '⚠️ Введите сумму';
                else if (rewardPool === 0) warningMsg = '⚠️ Пул наград пуст, стейкинг временно недоступен';
                else warningMsg = '⚠️ Сумма превышает ваш баланс';
                document.getElementById('warning').innerHTML = warningMsg;
                stakeBtn.disabled = true;
            } else {
                document.getElementById('warning').innerHTML = '';
                stakeBtn.disabled = false;
            }
        }

        // Функция отправки Jetton транзакции
        async function sendJettonTransaction(comment, amountNano) {
            addLog(`🚀 Отправка Jetton: comment=${comment}, amount=${amountNano} nano`);
            
            if (!tonConnectUI || !walletAddress) {
                alert('Кошелек не подключен');
                return false;
            }
            
            if (!jettonWallet) {
                alert('Jetton-кошелек не найден. Убедитесь, что у вас есть CER токены.');
                return false;
            }
            
            // Кодируем комментарий в base64
            const commentBytes = new TextEncoder().encode(comment);
            const payload = btoa(String.fromCharCode(...commentBytes));
            
            const transaction = {
                validUntil: Math.floor(Date.now() / 1000) + 600,
                messages: [{
                    address: jettonWallet,
                    amount: "0",
                    payload: payload
                }]
            };
            
            addLog(`📨 Отправка транзакции...`);
            
            try {
                const result = await tonConnectUI.sendTransaction(transaction);
                addLog(`✅ Транзакция успешно отправлена!`);
                alert('Транзакция отправлена!');
                return true;
            } catch(e) {
                addLog(`❌ Ошибка: ${e.message}`);
                alert(`Ошибка: ${e.message}`);
                return false;
            }
        }

        // Стейкинг
        document.getElementById('stake-btn').onclick = async () => {
            const amount = parseFloat(document.getElementById('amount').value);
            const days = parseInt(document.getElementById('lock-days').value);
            
            if (!amount || amount <= 0) {
                alert('Введите сумму');
                return;
            }
            
            if (amount > Math.min(userBalance, rewardPool / 1e9)) {
                alert('Сумма превышает лимит');
                return;
            }
            
            const amountNano = Math.floor(amount * 1e9);
            await sendJettonTransaction(days.toString(), amountNano);
        };

        // Unstake
        document.getElementById('unstake-btn').onclick = async () => {
            await sendJettonTransaction("0", 1);
        };

        // Админские команды (пока заглушки)
        document.getElementById('set-rate30').onclick = () => alert('Админ-функции будут добавлены');
        document.getElementById('set-rate90').onclick = () => alert('Админ-функции будут добавлены');
        document.getElementById('set-rate180').onclick = () => alert('Админ-функции будут добавлены');
        document.getElementById('set-rate365').onclick = () => alert('Админ-функции будут добавлены');
        document.getElementById('add-reward').onclick = () => alert('Пополнение пула будет добавлено');
        document.getElementById('withdraw-pool').onclick = () => alert('Вывод пула будет добавлен');
        document.getElementById('emergency-withdraw-pool').onclick = () => alert('Аварийный вывод будет добавлен');

        async function init() {
            addLog('🚀 Инициализация TonConnect...');
            
            tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
                manifestUrl: 'https://raw.githubusercontent.com/brendbonus-star/cer-staking/main/tonconnect-manifest.json',
                buttonRootId: 'connect-btn'
            });
            
            await tonConnectUI.ready;
            addLog('✅ TonConnect готов');
            
            tonConnectUI.onStatusChange(async (wallet) => {
                if (wallet) {
                    walletAddress = wallet.account.address;
                    addLog(`✅ Кошелек подключен: ${walletAddress}`);
                    document.getElementById('wallet-status').innerHTML = '✅ Кошелек подключен';
                    document.getElementById('wallet-address').innerHTML = walletAddress;
                    await updateData();
                    document.getElementById('admin-panel').style.display = 'block';
                } else {
                    walletAddress = null;
                    jettonWallet = null;
                    addLog('🔌 Кошелек отключен');
                    document.getElementById('wallet-status').innerHTML = '⚡ Кошелек не подключен';
                    document.getElementById('wallet-address').innerHTML = '';
                    document.getElementById('admin-panel').style.display = 'none';
                    document.getElementById('cer-balance').textContent = '0';
                }
            });
            
            await updateData();
            setInterval(updateData, 30000);
        }

        document.getElementById('lock-days').addEventListener('change', updateUI);
        document.getElementById('amount').addEventListener('input', updateUI);
        
        init();
    </script>
</body>
</html>
