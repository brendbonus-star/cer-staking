<head>

<body>
    <!-- ... (весь HTML остается без изменений) ... -->
    <script>
        const STAKING_ADDRESS = "EQBLEMocvp-FS-jfhEKAQ2261_ZwJRvUKmaHHhZXIizLJQvs";
        const JETTON_MASTER = "EQCeFJOkajBxztRloikZ9iUHhqnymZoX3pgxY47bbVlQuA3G";
        const API_URL = "https://bot_1774369555_7516_legkiy.bothost.tech"; // Ваш API

        let tonConnectUI;
        let walletAddress = null;
        let rewardPool = 0;
        let myStake = 0;
        let myReward = 0;
        let unlockTime = 0;

        // ... (все ваши функции calculateMaxAmount, calculateProfit, updateUI, getRewardPoolDirect, checkPoolStatus, initTonConnect остаются без изменений) ...

        // ========== НОВАЯ КНОПКА, КОТОРАЯ РАБОТАЕТ ==========
        document.getElementById('stake-btn').addEventListener('click', async () => {
            if (!walletAddress) { 
                alert('Сначала подключите кошелек'); 
                return; 
            }
            
            const amount = parseFloat(document.getElementById('amount').value);
            const days = parseInt(document.getElementById('lock-days').value);
            const maxAllowed = calculateMaxAmount(days);
            
            if (!amount || amount <= 0) { 
                alert('Введите сумму'); 
                return; 
            }
            
            if (amount > maxAllowed) { 
                alert(`Сумма превышает доступный лимит пула (максимум ${maxAllowed} CER)`); 
                return; 
            }

            try {
                // 1. Отправляем запрос на твой сервер (Bothost)
                const response = await fetch(`${API_URL}/stake`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user: walletAddress,
                        amount: amount,
                        days: days
                    })
                });
                
                const data = await response.json();
                
                if (data.error) {
                    throw new Error(data.error);
                }
                
                if (!data.transaction) {
                    throw new Error('Не удалось получить транзакцию от сервера');
                }
                
                // 2. Отправляем готовую транзакцию в TonConnect
                const transaction = {
                    validUntil: Math.floor(Date.now() / 1000) + 600,
                    messages: [data.transaction]
                };
                
                await tonConnectUI.sendTransaction(transaction);
                alert('Стейкинг отправлен!');
                
            } catch(e) {
                alert('Ошибка: ' + e.message);
                console.error(e);
            }
        });

        // ... (код для unstake-btn остается без изменений) ...

        checkPoolStatus();
        initTonConnect();
        setInterval(checkPoolStatus, 30000);
    </script>
</body>
</html>
